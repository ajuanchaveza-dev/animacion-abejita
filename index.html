<html>
<head>
    <title>Animaciones 3</title>
    <style>
        *{
            margin: 0px;
            padding: 0px;
        }

        .contenedor{
            width: 400px;
            height: 200px;
            border: 1px solid black;
            position: relative;/*provoca el centrado del div contenedor*/
            margin: 0 auto;/*provoca el centrado del div contenedor*/
            overflow: hidden;
            background-image: url(img/campo-verde-campo-verde-montanas-fondo_788759-8981.avif);
            background-size: cover;
        }
        .cuadrito{
            width:50px;
            height: 50px;
            
            position: absolute;
            left: -100px;
            top: 50px;


            animation: cuadrito 10s infinite;
        }

        @keyframes cuadrito{
            0%{
                left: -100px;
                top: 50px;
                rotate: 0deg;
            }
            50%{
                left: 175px;
                top: 0px;
                rotate: 60deg;
            }
            100%{
                left: 400px;
                top: 50px;
                rotate: 0deg;
            }
        }

        .cuadrito img{
            width: 50px;
            height: 50px;
        }

.cuadrito2{
    width: 50px;
    height: 50px;
    position: absolute;
    top: 150px;
    left: -50px;
    animation: cuadrito2 5s infinite;
}
@keyframes cuadrito2{
    0%{
        top: 200px;
        left: -50px;
        rotate: 0deg; 
    }
    50%{
        top: 50px;
        left: 175px;
        rotate: 60deg; 
    }
    100%{
        top: 150px;
        left: 450px;
        rotate: 0deg; 
    }
}
.cuadrito2 img{
    width: 50px;
    height: 50px;
}
    </style>
</head>
<body>
    <div class="contenedor">
        <div class="cuadrito">
            <img src="img/kawaii-bee-character-png.webp" alt="">
        </div>
        <div class="cuadrito2">
            <img src="img/kawaii-bee-character-png.webp" alt="">

        </div>
    </div>
</body>
</html>
